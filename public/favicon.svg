<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#7c3aed" rx="0"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="128" cy="128" r="110" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- AI Brain/Mind icon -->
  <!-- Left circuit line -->
  <path d="M 70 100 Q 80 90 90 95 Q 95 80 105 85" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right circuit line -->
  <path d="M 186 100 Q 176 90 166 95 Q 161 80 151 85" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center node -->
  <circle cx="128" cy="128" r="18" fill="#ffffff"/>
  <circle cx="128" cy="128" r="12" fill="#7c3aed"/>
  
  <!-- Top nodes -->
  <circle cx="95" cy="85" r="8" fill="#ffffff"/>
  <circle cx="161" cy="85" r="8" fill="#ffffff"/>
  
  <!-- Bottom nodes -->
  <circle cx="80" cy="165" r="8" fill="#ffffff"/>
  <circle cx="176" cy="165" r="8" fill="#ffffff"/>
  
  <!-- Bottom center node -->
  <circle cx="128" cy="180" r="8" fill="#ffffff"/>
  
  <!-- Connection lines from center to nodes -->
  <line x1="128" y1="110" x2="95" y2="93" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="110" x2="161" y2="93" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="140" x2="80" y2="165" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="141" y1="140" x2="176" y2="165" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="146" x2="128" y2="172" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <circle cx="128" cy="128" r="125" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
</svg>
